<!-- v5 -->
<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Fantasy Quest</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- BACKGROUND -->
  <div class="bg-layer">
    <img src="assets/background/fantasy_background_main.png" alt="" class="bg-img" />
    <div class="bg-overlay"></div>
    <div class="bg-vignette"></div>
  </div>

  <!-- PARTICLE CANVAS -->
  <canvas id="particleCanvas" class="particle-canvas"></canvas>

  <!-- SCREEN -->
  <div class="screen">

    <!-- 1. LOGO -->
    <div class="top-header">
      <img src="assets/ui/logo.png" alt="Game Logo" class="logo" />
    </div>

    <!-- 2. HERO STAGE (flex:1, all layers absolute inside) -->
    <div class="hero-stage">

      <div class="aura-wrap">
        <img src="assets/effects/hero_aura.png" alt="" class="hero-aura" />
      </div>

      <div class="glow-wrap">
        <img src="assets/effects/particle_glow.png" alt="" class="particle-glow" />
      </div>

      <!-- CHARACTER (absolute, bottom-anchored above platform) -->
      <div class="character-wrap">
        <img src="assets/characters/magikus_lany.png" alt="Hero" class="character" />
      </div>

      <!-- PLATFORM (absolute, sits at bottom of stage) -->
      <div class="platform-wrap">
        <img src="assets/map/hero_platform.png" alt="" class="hero-platform" />
      </div>

    </div>

    <!-- 3. BOTTOM PANEL (flex-shrink:0, never pushed off screen) -->
    <div class="bottom-panel">

      <div class="xp-section">
        <div class="xp-bar-container">
          <img src="assets/ui/xp_bar_frame.png" alt="" class="xp-frame" />
          <div class="xp-fill-track">
            <div class="xp-fill"></div>
          </div>
          <span class="xp-label">XP <span class="xp-value">2 480 / 5 000</span></span>
        </div>
      </div>

      <div class="play-wrap">
        <div class="play-glow-ring"></div>
        <button class="play-btn" id="playBtn">
          <img src="assets/ui/play_button.png" alt="Kezdés" class="play-img" />
        </button>
      </div>

      <div class="bottom-nav">
        <button class="nav-pill active">
          <svg viewBox="0 0 24 24" fill="none"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M9 21V12h6v9" stroke="currentColor" stroke-width="1.8"/></svg>
          <span>Főoldal</span>
        </button>
        <button class="nav-pill">
          <svg viewBox="0 0 24 24" fill="none"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M9 12h6M9 16h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          <span>Küldetés</span>
        </button>
        <button class="nav-pill">
          <svg viewBox="0 0 24 24" fill="none"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
          <span>Tárgyak</span>
        </button>
        <button class="nav-pill">
          <svg viewBox="0 0 24 24" fill="none"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
          <span>Bolt</span>
        </button>
      </div>

    </div><!-- /bottom-panel -->

    <!-- Floating badges -->
    <div class="rune rune-tl">✦</div>
    <div class="rune rune-tr">✦</div>

    <div class="notif-badge">
      <span class="notif-icon">⚔</span>
      <span class="notif-text">Új küldetés elérhető!</span>
      <div class="notif-dot"></div>
    </div>

    <div class="level-badge">
      <span class="level-label">SZint</span>
      <span class="level-num">24</span>
    </div>

  </div><!-- /screen -->

  <script>
    /* ── Play button ── */
    document.getElementById('playBtn').addEventListener('click', function() {
      this.classList.add('pressed');
      const r = document.createElement('span');
      r.className = 'ripple';
      this.appendChild(r);
      setTimeout(() => { r.remove(); this.classList.remove('pressed'); }, 600);
    });

    /* ── Nav pills ── */
    document.querySelectorAll('.nav-pill').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.nav-pill').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
      });
    });

    /* ── Particle canvas ── */
    const canvas = document.getElementById('particleCanvas');
    const ctx    = canvas.getContext('2d');

    function resize() {
      canvas.width  = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function mkParticle() {
      return {
        x: Math.random() * canvas.width,
        y: canvas.height + 20,
        r: Math.random() * 2.5 + 0.4,
        speed: Math.random() * 0.55 + 0.18,
        drift: (Math.random() - 0.5) * 0.28,
        alpha: Math.random() * 0.55 + 0.2,
        color: Math.random() > 0.5 ? '#f9d86e' : '#c39aff',
        life: 0,
        maxLife: Math.random() * 280 + 180
      };
    }

    const particles = Array.from({ length: 60 }, () => {
      const p = mkParticle();
      p.y    = Math.random() * canvas.height;
      p.life = Math.random() * p.maxLife;
      return p;
    });

    (function tick() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach((p, i) => {
        p.life++; p.y -= p.speed; p.x += p.drift;
        const t    = p.life / p.maxLife;
        const fade = t < 0.15 ? t / 0.15 : t > 0.8 ? (1 - t) / 0.2 : 1;
        ctx.save();
        ctx.globalAlpha = p.alpha * fade;
        ctx.shadowBlur  = 8;
        ctx.shadowColor = p.color;
        ctx.fillStyle   = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        if (p.life >= p.maxLife) particles[i] = mkParticle();
      });
      requestAnimationFrame(tick);
    })();
  </script>
</body>
</html>
