<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="utf-8">
  <title>Pass the Pin – Final Clean</title>

  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    html, body, #map {
      height: 100%;
      margin: 0;
    }

    /* TÉRKÉP HANGOLÁS */
    /*
	.leaflet-tile {
      //filter: brightness(0.98) saturate(1.1);
	  filter: sepia(0.35) saturate(1.2) brightness(0.97);
    }
	*/
	.leaflet-tile {
	  filter:
		sepia(0.4)
		saturate(0.95)
		hue-rotate(-18deg)
		brightness(1.02)
		contrast(1.18);
	}

	
    /* ===== MARKER ===== */
    .pin-wrap {
      position: relative;
      width: 48px;
      height: 48px;
    }

    .pin-svg {
      width: 26px;          /* picit nagyobb */
      height: 36px;
      position: absolute;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
    }

    /* ===== BUBORÉK ===== */
    .leaflet-tooltip.passpin {
      background: none;
      border: none;
      box-shadow: none;
      padding: 0;
    }

    .bubble {
      background: #f7efe6;
      border: 2px solid #d6b36a;
      border-radius: 18px;
      padding: 10px 14px;
      color: #2b1e1e;
      font-size: 14px;
      box-shadow: 0 12px 24px rgba(0,0,0,0.25);
      animation: float 3.5s ease-in-out infinite;
    }

    .bubble::after {
      content: "";
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 10px solid #f7efe6;
    }

    .city {
      font-family: Georgia, serif;
      font-size: 12px;
      font-weight: bold;
      text-align: center;
      color: #b08a3c;
      margin-bottom: 4px;
    }

    .msg {
      font-family: "Comic Sans MS", cursive;
      text-align: center;
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
  </style>
</head>

<body>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  const DATA_URL =
    "https://script.google.com/macros/s/AKfycbzjcZx7zTlU6riY87S8jl5zbS82sjE1tLdtTdrLdUbM3thEbpYHxl00GAbtYlZ5AiZA/exec";

  /* ===== MAP ===== */
  const map = L.map("map").setView([47.3, 19.2], 8);
	
	L.tileLayer(
	  "https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png"
	).addTo(map);

/*	
  L.tileLayer(
    "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png"
  ).addTo(map);
*/
  fetch(DATA_URL)
    .then(r => r.json())
    .then(data => {

      data.features.forEach(f => {

        /* ===== VONALAK ===== */
        if (f.geometry.type === "LineString") {
          L.polyline(
            f.geometry.coordinates.map(c => [c[1], c[0]]),
            {
              color: f.properties.stroke,
              weight: f.properties["stroke-width"],
              opacity: f.properties["stroke-opacity"]
            }
          ).addTo(map);
        }

        /* ===== MARKER + BUBORÉK ===== */
        if (f.geometry.type === "Point" && f.properties.message) {

          const html = `
            <div class="pin-wrap">
              <svg class="pin-svg" viewBox="0 0 24 32">
                <defs>
                  <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#e75b5b"/>
                    <stop offset="100%" stop-color="#b83232"/>
                  </linearGradient>
                </defs>
                <path fill="url(#g)"
                  d="M12 0C7 0 3 4 3 9c0 7 9 17 9 17s9-10 9-17c0-5-4-9-9-9z"/>
                <path fill="#fff"
                  d="M12 8c1.7-2 5 0 0 4-5-4-1.7-6 0-4z"/>
              </svg>
            </div>
          `;

          const icon = L.divIcon({
            html,
            iconSize: [48,48],
            iconAnchor: [24,42],
            className: ""
          });

          const marker = L.marker(
            [f.geometry.coordinates[1], f.geometry.coordinates[0]],
            { icon }
          ).addTo(map);

          marker.bindTooltip(
            `
            <div class="bubble">
              <div class="city">${f.properties.city}</div>
              <div class="msg">${f.properties.message}</div>
            </div>
            `,
            {
              className: "passpin",
              direction: "top",
              offset: [0,-18],
              opacity: 1
            }
          );
        }
      });
    });
</script>
</body>
</html>
