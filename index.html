<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>Fantasy Quest</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
</head>
<body>

<!-- ═══════════════════════════════════════════
     LAYER 0 — Background (blurred, darkened)
═══════════════════════════════════════════ -->
<div class="bg-root">
  <img src="assets/background/fantasy_background_main.png" alt="" class="bg-img"/>
  <div class="bg-blur-overlay"></div>
  <div class="bg-darken"></div>
  <div class="bg-cinematic-top"></div>
  <div class="bg-cinematic-bot"></div>
  <div class="bg-vignette"></div>
</div>

<!-- ═══════════════════════════════════════════
     LAYER 1 — Foreground particle canvas (CSS)
═══════════════════════════════════════════ -->
<canvas id="fgCanvas" class="fg-canvas"></canvas>

<!-- ═══════════════════════════════════════════
     LAYER 2 — Screen
═══════════════════════════════════════════ -->
<div class="screen">

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="top-left">
      <div class="avatar-ring">
        <div class="avatar-inner">⚔</div>
      </div>
      <div class="player-info">
        <div class="player-name">Aryndel</div>
        <div class="player-sub">Misztikus Mágus</div>
      </div>
    </div>
    <img src="assets/ui/logo.png" alt="Logo" class="top-logo"/>
    <div class="top-right">
      <div class="gem-pill">
        <span class="gem-icon">💎</span>
        <span class="gem-count">4 820</span>
      </div>
    </div>
  </div>

  <!-- XP BAR — tight under top bar -->
  <div class="xp-row">
    <div class="xp-wrap">
      <img src="assets/ui/xp_bar_frame.png" alt="" class="xp-frame-img"/>
      <div class="xp-track">
        <div class="xp-fill"></div>
        <div class="xp-shine"></div>
      </div>
      <span class="xp-txt">SZint 24 · 2 480 / 5 000 XP</span>
    </div>
  </div>

  <!-- ════ HERO SCENE — core composition ════ -->
  <div class="hero-scene">

    <!-- BACK glow radial -->
    <div class="scene-back-glow"></div>

    <!-- Aura (behind character) -->
    <div class="layer-aura">
      <img src="assets/effects/hero_aura.png" alt="" class="aura-img"/>
    </div>

    <!-- Particle glow ring -->
    <div class="layer-glow-ring">
      <img src="assets/effects/particle_glow.png" alt="" class="glow-ring-img"/>
    </div>

    <!-- Floating crystals (CSS-generated) -->
    <div class="crystals">
      <div class="crystal c1">◆</div>
      <div class="crystal c2">◇</div>
      <div class="crystal c3">◆</div>
      <div class="crystal c4">◇</div>
      <div class="crystal c5">✦</div>
      <div class="crystal c6">✦</div>
    </div>

    <!-- CHARACTER — hero, biggest layer -->
    <div class="layer-character">
      <img src="assets/characters/magikus_lany.png" alt="Hero" class="character-img"/>
      <!-- character bottom glow -->
      <div class="char-foot-glow"></div>
    </div>

    <!-- Platform (small, below hero) -->
    <div class="layer-platform">
      <img src="assets/map/hero_platform.png" alt="" class="platform-img"/>
    </div>

    <!-- PLAY BUTTON — overlaps hero bottom, cinematic position -->
    <div class="play-zone">
      <div class="play-outer-ring"></div>
      <div class="play-mid-ring"></div>
      <button class="play-btn" id="playBtn">
        <img src="assets/ui/play_button.png" alt="" class="play-bg-img"/>
        <div class="play-inner">
          <span class="play-sub">Nyomj rá és</span>
          <span class="play-main">KALANDOZZ</span>
        </div>
        <div class="play-sparkles">
          <span class="ps ps1">✦</span>
          <span class="ps ps2">✦</span>
          <span class="ps ps3">✦</span>
        </div>
      </button>
    </div>

    <!-- Foreground depth fog (bottom of scene) -->
    <div class="scene-fg-fog"></div>

  </div><!-- /hero-scene -->

  <!-- ════ BOTTOM DOCK ════ -->
  <div class="bottom-dock">

    <!-- Quick-action row -->
    <div class="quick-row">
      <button class="quick-btn qb-red">
        <span class="qb-icon">⚔</span>
        <span class="qb-label">Csata</span>
        <div class="qb-badge">3</div>
      </button>
      <button class="quick-btn qb-purple">
        <span class="qb-icon">📜</span>
        <span class="qb-label">Küldetés</span>
        <div class="qb-badge">!</div>
      </button>
      <button class="quick-btn qb-blue">
        <span class="qb-icon">🏰</span>
        <span class="qb-label">Vár</span>
      </button>
      <button class="quick-btn qb-gold">
        <span class="qb-icon">🛒</span>
        <span class="qb-label">Bolt</span>
      </button>
    </div>

    <!-- Notification ribbon -->
    <div class="notif-ribbon">
      <div class="notif-dot"></div>
      <span class="notif-sword">⚔</span>
      <span class="notif-msg">Új küldetés vár rád — Elesett Királyság</span>
      <span class="notif-arrow">›</span>
    </div>

  </div>

  <!-- Level badge floating -->
  <div class="lvl-badge">
    <span class="lvl-n">24</span>
    <span class="lvl-l">LVL</span>
  </div>

  <!-- Cinematic corner details -->
  <div class="corner-tl"></div>
  <div class="corner-tr"></div>

</div><!-- /screen -->

<script>
/* ── Foreground particle canvas ── */
const C = document.getElementById('fgCanvas');
const X = C.getContext('2d');

function resize(){
  C.width  = C.offsetWidth  * devicePixelRatio;
  C.height = C.offsetHeight * devicePixelRatio;
  X.scale(devicePixelRatio, devicePixelRatio);
}
window.addEventListener('resize', resize);
resize();

const W = () => C.offsetWidth, H = () => C.offsetHeight;

const COLS = ['#f9d86e','#c39aff','#7ef9f0','#fff3bb','#ff9de2'];
let pts = [];

function mkPt(){
  // Cluster particles more in the center (hero area)
  const cx = W() * 0.5 + (Math.random()-0.5) * W() * 0.7;
  return {
    x: cx,
    y: H() * (0.25 + Math.random() * 0.65),
    r: Math.random() * 2.2 + 0.4,
    vx: (Math.random()-0.5) * 0.35,
    vy: -(Math.random() * 0.55 + 0.15),
    a: 0,
    maxA: Math.random() * 0.55 + 0.2,
    col: COLS[Math.floor(Math.random()*COLS.length)],
    life: 0,
    maxL: 180 + Math.random() * 220
  };
}

for(let i=0;i<80;i++){
  const p = mkPt();
  p.life = Math.random() * p.maxL;
  p.a    = p.maxA * Math.random();
  pts.push(p);
}

function draw(){
  X.clearRect(0,0,W(),H());
  pts.forEach((p,i)=>{
    p.life++;
    p.x += p.vx;
    p.y += p.vy;
    const t = p.life/p.maxL;
    const fade = t < 0.15 ? t/0.15 : t > 0.8 ? (1-t)/0.2 : 1;
    p.a = p.maxA * fade;

    X.save();
    X.globalAlpha = p.a;
    X.shadowBlur  = 10;
    X.shadowColor = p.col;
    X.fillStyle   = p.col;
    X.beginPath();
    X.arc(p.x, p.y, p.r, 0, Math.PI*2);
    X.fill();
    X.restore();

    if(p.life >= p.maxL) pts[i] = mkPt();
  });
  requestAnimationFrame(draw);
}
draw();

/* ── Play button tap ── */
const btn = document.getElementById('playBtn');
btn.addEventListener('click', function(){
  this.classList.add('tap');
  setTimeout(()=>this.classList.remove('tap'),350);
});
</script>
</body>
</html>
