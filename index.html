<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Fantasy Quest</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Full background -->
  <div class="bg-layer">
    <img src="assets/background/fantasy_background_main.png" alt="" class="bg-img" />
    <div class="bg-overlay"></div>
    <div class="bg-vignette"></div>
  </div>

  <!-- Floating particles -->
  <canvas id="particleCanvas" class="particle-canvas"></canvas>

  <!-- Main screen wrapper -->
  <div class="screen">

    <!-- TOP: Logo -->
    <header class="top-header">
      <img src="assets/ui/logo.png" alt="Game Logo" class="logo" />
    </header>

    <!-- CENTER: Hero stage -->
    <main class="hero-stage">

      <!-- Aura glow behind character -->
      <div class="aura-wrap">
        <img src="assets/effects/hero_aura.png" alt="" class="hero-aura" />
      </div>

      <!-- Particle glow overlay -->
      <div class="glow-wrap">
        <img src="assets/effects/particle_glow.png" alt="" class="particle-glow" />
      </div>

      <!-- Character -->
      <div class="character-wrap">
        <img src="assets/characters/magikus_lany.png" alt="Hero Character" class="character" />
      </div>

      <!-- Platform — below character -->
      <div class="platform-wrap">
        <img src="assets/map/hero_platform.png" alt="" class="hero-platform" />
      </div>

    </main>

    <!-- BOTTOM: UI panel -->
    <footer class="bottom-panel">

      <!-- XP Bar -->
      <div class="xp-section">
        <div class="xp-bar-container">
          <img src="assets/ui/xp_bar_frame.png" alt="" class="xp-frame" />
          <div class="xp-fill-track">
            <div class="xp-fill"></div>
          </div>
          <span class="xp-label">XP &nbsp;<span class="xp-value">2 480 / 5 000</span></span>
        </div>
      </div>

      <!-- Play Button -->
      <div class="play-wrap">
        <div class="play-glow-ring"></div>
        <button class="play-btn" id="playBtn" aria-label="Játék indítása">
          <img src="assets/ui/play_button.png" alt="Játék indítása" class="play-img" />
          <span class="play-text">KALAND KEZDÉSE</span>
        </button>
      </div>

      <!-- Bottom nav pills -->
      <nav class="bottom-nav">
        <button class="nav-pill active" aria-label="Főoldal">
          <svg viewBox="0 0 24 24" fill="none"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M9 21V12h6v9" stroke="currentColor" stroke-width="1.8"/></svg>
          <span>Főoldal</span>
        </button>
        <button class="nav-pill" aria-label="Küldetések">
          <svg viewBox="0 0 24 24" fill="none"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M9 12h6M9 16h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          <span>Küldetés</span>
        </button>
        <button class="nav-pill" aria-label="Felszerelés">
          <svg viewBox="0 0 24 24" fill="none"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
          <span>Tárgyak</span>
        </button>
        <button class="nav-pill" aria-label="Bolt">
          <svg viewBox="0 0 24 24" fill="none"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
          <span>Bolt</span>
        </button>
      </nav>

    </footer>

    <!-- Decorative corner runes -->
    <div class="rune rune-tl">✦</div>
    <div class="rune rune-tr">✦</div>

    <!-- Notification badge -->
    <div class="notif-badge">
      <span class="notif-icon">⚔</span>
      <span class="notif-text">Új küldetés elérhető!</span>
      <div class="notif-dot"></div>
    </div>

    <!-- Level badge -->
    <div class="level-badge">
      <span class="level-label">SZint</span>
      <span class="level-num">24</span>
    </div>

  </div><!-- /screen -->

  <script>
    // Play button ripple
    const playBtn = document.getElementById('playBtn');
    playBtn.addEventListener('click', function(e) {
      this.classList.add('pressed');
      const ripple = document.createElement('span');
      ripple.className = 'ripple';
      this.appendChild(ripple);
      setTimeout(() => { ripple.remove(); this.classList.remove('pressed'); }, 600);
    });

    // Nav pill active toggle
    document.querySelectorAll('.nav-pill').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.nav-pill').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
      });
    });

    // Particle canvas
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function randomParticle() {
      return {
        x: Math.random() * canvas.width,
        y: canvas.height + Math.random() * 100,
        r: Math.random() * 2.5 + 0.5,
        speed: Math.random() * 0.6 + 0.2,
        drift: (Math.random() - 0.5) * 0.3,
        alpha: Math.random() * 0.6 + 0.2,
        color: Math.random() > 0.5 ? '#f9d86e' : '#c39aff',
        life: 0,
        maxLife: Math.random() * 300 + 200
      };
    }

    let particles = [];
    for (let i = 0; i < 60; i++) {
      const p = randomParticle();
      p.y = Math.random() * canvas.height;
      p.life = Math.random() * p.maxLife;
      particles.push(p);
    }

    function tick() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach((p, i) => {
        p.life++;
        p.y -= p.speed;
        p.x += p.drift;
        const fade = p.life < 40 ? p.life / 40 : p.life > p.maxLife - 40 ? (p.maxLife - p.life) / 40 : 1;
        ctx.save();
        ctx.globalAlpha = p.alpha * fade;
        ctx.shadowBlur = 8;
        ctx.shadowColor = p.color;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        if (p.life >= p.maxLife) particles[i] = randomParticle();
      });
      requestAnimationFrame(tick);
    }
    tick();
  </script>
</body>
</html>
